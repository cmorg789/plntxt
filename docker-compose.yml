services:
  db:
    image: surrealdb/surrealdb:latest
    command: start --user root --pass changeme --allow-experimental files file:/data/db.surql
    expose:
      - "8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "surreal", "isready", "--conn", "http://localhost:8000"]
      interval: 2s
      timeout: 5s
      retries: 15

  init:
    image: surrealdb/surrealdb:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./schema.surql:/schema.surql:ro
      - ./init.surql:/init.surql:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        surreal import --conn http://db:8000 --user root --pass changeme --ns plntxt --db plntxt /schema.surql &&
        surreal import --conn http://db:8000 --user root --pass changeme --ns plntxt --db plntxt /init.surql &&
        echo 'plntxt initialized'
    restart: "no"

  web:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/srv/public:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  caddy_data:
