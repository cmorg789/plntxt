services:
  db:
    image: surrealdb/surrealdb:latest
    command: start --user root --pass changeme --bind 0.0.0.0:8000 --allow-experimental=files --allow-guests surrealkv:/data/db
    environment:
      SURREAL_BUCKET_FOLDER_ALLOWLIST: "/data/uploads"
    expose:
      - "8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://127.0.0.1:8000"]
      interval: 2s
      timeout: 5s
      retries: 15

  init-schema:
    image: surrealdb/surrealdb:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./schema.surql:/schema.surql:ro
    entrypoint: ["/surreal"]
    command: ["import", "--endpoint", "http://db:8000", "--user", "root", "--pass", "changeme", "--ns", "plntxt", "--db", "plntxt", "/schema.surql"]
    restart: "no"

  init-seed:
    image: surrealdb/surrealdb:latest
    depends_on:
      init-schema:
        condition: service_completed_successfully
    volumes:
      - ./init.surql:/init.surql:ro
    entrypoint: ["/surreal"]
    command: ["import", "--endpoint", "http://db:8000", "--user", "root", "--pass", "changeme", "--ns", "plntxt", "--db", "plntxt", "/init.surql"]
    restart: "no"

  web:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/srv/public:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  caddy_data:
