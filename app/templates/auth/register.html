{% extends "base.html" %}

{% block title %}Register — plntxt{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Register</h1>

    {% if error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/auth/register/form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required
               value="{{ username or '' }}" autocomplete="username">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required
               value="{{ email or '' }}" autocomplete="email">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               minlength="8" autocomplete="new-password">

        <button type="submit">Register</button>
    </form>

    <p class="auth-alt">Already have an account? <a href="/auth/login">Login</a></p>
</div>
{% endblock %}
