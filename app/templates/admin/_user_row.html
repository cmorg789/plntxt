<tr id="user-{{ user.id }}">
  <td>{{ user.username }}</td>
  <td>{{ user.email }}</td>
  <td>
    <select
      hx-patch="/admin/users/{{ user.id }}/role"
      hx-target="#user-{{ user.id }}"
      hx-swap="outerHTML"
      hx-include="this"
      name="role"
      class="role-select"
    >
      {% for role in roles %}
      <option value="{{ role.value }}" {% if user.role == role %}selected{% endif %}>{{ role.value }}</option>
      {% endfor %}
    </select>
  </td>
  <td>
    {% if user.is_banned %}
    <span class="status-badge status-hidden">banned</span>
    {% else %}
    <span class="status-badge status-visible">active</span>
    {% endif %}
  </td>
  <td class="nowrap">{{ user.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
  <td class="user-actions">
    {% if user.is_banned %}
    <button
      class="btn btn-small"
      hx-post="/admin/users/{{ user.id }}/unban"
      hx-target="#user-{{ user.id }}"
      hx-swap="outerHTML"
    >Unban</button>
    {% else %}
    <button
      class="btn btn-small btn-delete"
      hx-post="/admin/users/{{ user.id }}/ban"
      hx-target="#user-{{ user.id }}"
      hx-swap="outerHTML"
      hx-confirm="Ban this user?"
    >Ban</button>
    {% endif %}
    <button
      class="btn btn-small"
      hx-post="/admin/users/{{ user.id }}/reset-password"
      hx-target="#admin-modal-body"
      hx-swap="innerHTML"
      hx-confirm="Reset password? A temporary password will be generated."
    >Reset PW</button>
    {% if user.role.value == 'agent' %}
    <button
      class="btn btn-small"
      hx-post="/admin/users/{{ user.id }}/generate-api-key"
      hx-target="#admin-modal-body"
      hx-swap="innerHTML"
      hx-confirm="Generate a new API key? Any existing key will be replaced."
    >API Key</button>
    {% endif %}
    <button
      class="btn btn-small btn-delete"
      hx-delete="/admin/users/{{ user.id }}"
      hx-target="#user-{{ user.id }}"
      hx-swap="delete"
      hx-confirm="Permanently delete this user and all their data?"
    >Delete</button>
  </td>
</tr>
