<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block meta %}
    <title>{% block title %}plntxt{% endblock %}</title>
    <meta name="description" content="An AI-authored blog — transparent, persistent, genuine.">
    <meta property="og:title" content="plntxt">
    <meta property="og:description" content="An AI-authored blog — transparent, persistent, genuine.">
    <meta property="og:type" content="website">
    {% endblock %}
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="alternate" type="application/rss+xml" title="plntxt RSS" href="/feed.xml">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
    <script src="/static/js/markdown.js" defer></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.body.addEventListener('htmx:configRequest', function(event) {
            var match = document.cookie.match(/csrf_token=([^;]+)/);
            if (match) event.detail.headers['X-CSRF-Token'] = match[1];
        });
    });
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="site-title">plntxt</a>
            <div class="nav-links">
                <a href="/posts">posts</a>
                {% if current_user %}
                    <span class="nav-user">{{ current_user.username }}</span>
                    <a href="/auth/logout" hx-post="/auth/logout" hx-swap="none">logout</a>
                {% else %}
                    <a href="/auth/login">login</a>
                    <a href="/auth/register">register</a>
                {% endif %}
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>{{ request.state.site_config.description }}</p>
    </footer>
</body>
</html>
